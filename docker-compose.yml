services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: driftgate
      POSTGRES_USER: driftgate
      POSTGRES_PASSWORD: dev
    # 5432 not exposed on host to avoid conflicts with local postgres; use a `psql` exec if needed
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "55433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U driftgate -d driftgate"]
      interval: 3s
      timeout: 3s
      retries: 20

  simulator:
    build: ./simulator
    ports:
      - "8001:8001"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/payload')"]
      interval: 10s
      timeout: 3s
      retries: 5

  mongo:
    image: mongo:7.0
    ports:
      - "27017:27017"
    volumes:
      - mongodata:/data/db
    environment:
      MONGO_INITDB_DATABASE: driftgate_documents

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+asyncpg://driftgate:dev@postgres:5432/driftgate
      DATABASE_URL_SYNC: postgresql://driftgate:dev@postgres:5432/driftgate
      ADMIN_SECRET: ${ADMIN_SECRET:-dev-secret}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-claude-haiku-4-5-20251001}
      FRONTEND_ORIGINS: ${FRONTEND_ORIGINS:-http://localhost:5173}
      REGISTRY_PATH: /app/config/apis.yaml
      FETCH_TIMEOUT_SEC: 10
      RAW_BODY_MAX_BYTES: 262144
      RAW_RETENTION_PER_ENDPOINT: 10
      DOCUMENT_STORE_BACKEND: mongo
      DOCUMENT_STORE_URI: mongodb://mongo:27017
      DOCUMENT_STORE_DATABASE: driftgate_documents
    volumes:
      - ./config:/app/config:ro
    ports:
      - "8301:8000"
    depends_on:
      postgres:
        condition: service_healthy
      simulator:
        condition: service_started
      mongo:
        condition: service_started

  frontend:
    build:
      context: ./frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

  gateway:
    build: ./gateway
    environment:
      WEBHOOK_HMAC_SECRET: ${WEBHOOK_HMAC_SECRET:-dev-webhook-secret}
      RUNTIME_INGEST_URL: http://runtime-guard:8018/track
      WEBHOOK_MAX_BODY_BYTES: ${WEBHOOK_MAX_BODY_BYTES:-262144}
      PORT: 3000
    ports:
      - "8303:3000"
    depends_on:
      runtime-guard:
        condition: service_started

  runtime-guard:
    build:
      context: .
      dockerfile: Dockerfile.runtime
    environment:
      EVENT_BACKEND: ${EVENT_BACKEND:-noop}
      DATABASE_URL: postgresql+asyncpg://driftgate:dev@postgres:5432/driftgate_runtime
      DATABASE_URL_SYNC: postgresql://driftgate:dev@postgres:5432/driftgate_runtime
      DB_POOL_SIZE: ${DB_POOL_SIZE:-25}
      DB_MAX_OVERFLOW: ${DB_MAX_OVERFLOW:-15}
      DB_POOL_TIMEOUT: ${DB_POOL_TIMEOUT:-30}
      UVICORN_WORKERS: ${UVICORN_WORKERS:-1}
      FRONTEND_ORIGINS: ${FRONTEND_ORIGINS:-http://localhost:5173}
      DOCUMENT_STORE_BACKEND: mongo
      DOCUMENT_STORE_URI: mongodb://mongo:27017
      DOCUMENT_STORE_DATABASE: driftgate_documents
    ports:
      - "8302:8018"
    depends_on:
      postgres:
        condition: service_healthy
      mongo:
        condition: service_started
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8018/api/v1/metrics')"]
      interval: 10s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
  mongodata:
