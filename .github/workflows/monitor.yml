name: DRIFTGATE Monitor

on:
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger monitor run
        run: |
          curl -fsSL --max-time 120 \
            -X POST "$BACKEND_URL/api/monitor/run-once" \
            -H "X-DRIFTGATE-ADMIN-SECRET: $ADMIN_SECRET" \
            -H "Content-Type: application/json"
        env:
          BACKEND_URL: ${{ secrets.DRIFTGATE_BACKEND_URL }}
          ADMIN_SECRET: ${{ secrets.DRIFTGATE_ADMIN_SECRET }}
