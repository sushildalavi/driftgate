name: DRIFTGATE CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: driftgate_test
          POSTGRES_USER: driftgate
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 3s
          --health-timeout 3s
          --health-retries 10

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt pytest pytest-asyncio

      - name: Run Alembic migrations
        env:
          DATABASE_URL: postgresql+asyncpg://driftgate:test@localhost:5432/driftgate_test
          DATABASE_URL_SYNC: postgresql://driftgate:test@localhost:5432/driftgate_test
          ADMIN_SECRET: ci-secret
          FRONTEND_ORIGINS: http://localhost:5174
          REGISTRY_PATH: /tmp/apis.yaml
        run: alembic upgrade head

      - name: Run tests
        env:
          DATABASE_URL: postgresql+asyncpg://driftgate:test@localhost:5432/driftgate_test
          DATABASE_URL_SYNC: postgresql://driftgate:test@localhost:5432/driftgate_test
          ADMIN_SECRET: ci-secret
          FRONTEND_ORIGINS: http://localhost:5174
          REGISTRY_PATH: /tmp/apis.yaml
        run: pytest -v

  runtime-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: driftgate_test
          POSTGRES_USER: driftgate
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 3s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Compile check
        run: python -m compileall app backend/app scripts

      - name: Run runtime tests
        env:
          DATABASE_URL: postgresql+asyncpg://driftgate:test@localhost:5432/driftgate_test
          DATABASE_URL_SYNC: postgresql://driftgate:test@localhost:5432/driftgate_test
          ADMIN_SECRET: ci-secret
          FRONTEND_ORIGINS: http://localhost:5174
          REGISTRY_PATH: /tmp/apis.yaml
        run: python -m pytest tests -v

  gateway-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: gateway

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: gateway/package-lock.json

      - name: Install
        run: npm install

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm install

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test -- --watch=false --browsers=ChromeHeadless

      - name: Build
        run: npm run build

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t driftgate-backend ./backend

      - name: Build gateway image
        run: docker build -t driftgate-gateway ./gateway

      - name: Build frontend image
        run: docker build -t driftgate-frontend ./frontend

      - name: Build drift-simulator image
        run: docker build -t driftgate-simulator ./simulator
